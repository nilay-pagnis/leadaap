<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 72" shape-rendering="geometricPrecision" role="img" aria-label="Enquireo">
  <title>Enquireo — primary logo</title>
  <defs>
    <linearGradient id="p-grad-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="p-grad-mid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="p-grad-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="p-glow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgb(99,102,241)" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#p-glow)">
    <g transform="translate(36 24) rotate(22)">
      <rect x="-23" y="-2.5" width="46" height="5" rx="1.85" fill="url(#p-grad-top)"/>
    </g>
    <g transform="translate(36 36) rotate(22)">
      <rect x="-18" y="-2.5" width="36" height="5" rx="1.85" fill="url(#p-grad-mid)"/>
    </g>
    <g transform="translate(36 48) rotate(22)">
      <rect x="-12.5" y="-2.5" width="25" height="5" rx="1.85" fill="url(#p-grad-bot)"/>
    </g>
  </g>
  <text x="86" y="46" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="600" letter-spacing="-0.04em" fill="#0f172a">Enquireo</text>
</svg>
